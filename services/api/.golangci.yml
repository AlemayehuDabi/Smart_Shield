run:
  timeout: 5m
  tests: true

# Generated code is excluded from linting — it's owned by gqlgen/sqlc.
issues:
  exclude-dirs:
    - internal/graphql/generated
    - internal/graphql/model
    - internal/user/repository/postgres/db
    - internal/portfolio/repository/postgres/db
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - gocritic
    - misspell
    - bodyclose
    - nilerr
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/AlemayehuDabi/smart-shield
  revive:
    rules:
      - name: exported
        disabled: false
