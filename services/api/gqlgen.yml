# Run from module root: `go tool gqlgen generate` (wired as `make generate`).
# Schema is modular: one .graphqls per bounded context, stitched by gqlgen.
schema:
  - api/graphql/schema/*.graphqls

exec:
  package: generated
  filename: internal/graphql/generated/generated.go

model:
  package: model
  filename: internal/graphql/model/models_gen.go

resolver:
  layout: follow-schema
  package: resolver
  dir: internal/graphql/resolver
  filename_template: "{name}.resolvers.go"

# We map domain <-> GraphQL models explicitly in the resolver layer, so do not
# let gqlgen auto-bind GraphQL types onto our domain structs.
autobind: []

# Custom scalars. Decimal aliases shopspring/decimal so GraphQL model fields are
# the SAME Go type our domain uses (no lossy conversion in resolvers).
models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
  DateTime:
    model:
      - github.com/99designs/gqlgen/graphql.Time
  Decimal:
    model:
      - github.com/AlemayehuDabi/smart-shield/services/api/internal/graphql/scalar.Decimal
